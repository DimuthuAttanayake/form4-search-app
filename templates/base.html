<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Insider Ledger{% endblock %}</title>
  <style>
    :root {
      --bg: #ffffff; --panel: #ffffff; --panel-2: #faf7f6;
      --fg: #1a1a1a; --body: #333333; --muted: #6a6a6a; --line: #e2ddda;
      --red: #8b0000; --buy: #157a4a; --sell: #b23b3b;
      --shadow: 0 1px 2px rgba(30,20,18,.05), 0 6px 22px rgba(30,20,18,.06);
      --font: Arial, Helvetica, sans-serif;
      --mono: ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg:#12100f; --panel:#1a1817; --panel-2:#201c1b; --fg:#f2efed; --body:#d9d4d1;
        --muted:#9a9490; --line:#332e2c; --red:#e06a5a; --buy:#43c184; --sell:#e26b6b;
        --shadow:0 1px 2px rgba(0,0,0,.4),0 8px 26px rgba(0,0,0,.35); }
    }
    :root[data-theme="dark"] { --bg:#12100f; --panel:#1a1817; --panel-2:#201c1b; --fg:#f2efed; --body:#d9d4d1;
      --muted:#9a9490; --line:#332e2c; --red:#e06a5a; --buy:#43c184; --sell:#e26b6b;
      --shadow:0 1px 2px rgba(0,0,0,.4),0 8px 26px rgba(0,0,0,.35); }
    :root[data-theme="light"] { --bg:#ffffff; --panel:#ffffff; --panel-2:#faf7f6; --fg:#1a1a1a; --body:#333333;
      --muted:#6a6a6a; --line:#e2ddda; --red:#8b0000; --buy:#157a4a; --sell:#b23b3b;
      --shadow:0 1px 2px rgba(30,20,18,.05),0 6px 22px rgba(30,20,18,.06); }

    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--body); font-family:var(--font);
      line-height:1.5; -webkit-font-smoothing:antialiased; }
    .container { max-width:1080px; margin:0 auto; padding:0 1.3rem; }

    /* nav */
    nav { border-bottom:2px solid var(--red); background:var(--bg); position:sticky; top:0; z-index:10; }
    nav .container { display:flex; align-items:center; justify-content:space-between; height:58px; }
    .brand { font-weight:700; font-size:1.25rem; color:var(--red); text-decoration:none; letter-spacing:-.01em; }
    .brand span { color:var(--red); border:1px solid var(--red); border-radius:4px; font-size:.6rem;
      letter-spacing:.08em; text-transform:uppercase; padding:.1rem .4rem; vertical-align:middle; margin-left:.5rem; font-weight:400; }
    .navlinks { display:flex; gap:1.4rem; }
    .navlinks a { color:var(--body); text-decoration:none; font-size:.92rem; padding:.3rem 0; border-bottom:2px solid transparent; }
    .navlinks a:hover { color:var(--red); }
    .navlinks a.active { color:var(--red); border-bottom-color:var(--red); font-weight:700; }

    main { padding:2.2rem 0 4rem; }
    h1 { font-weight:700; font-size:clamp(1.7rem,4vw,2.3rem); line-height:1.1;
      color:var(--fg); margin:0 0 .5rem; letter-spacing:-.01em; text-wrap:balance; }
    .sub { color:var(--muted); font-size:1rem; max-width:62ch; margin:0 0 1.6rem; }
    h2 { font-weight:700; font-size:1.25rem; color:var(--fg); margin:2.2rem 0 1rem;
      padding-bottom:.5rem; border-bottom:1px solid var(--line); }
    a { color:var(--red); }

    /* search bar + filter chips */
    .controls { background:var(--panel-2); border:1px solid var(--line); border-radius:10px;
      padding:1rem 1.1rem; margin-bottom:1.4rem; }
    .searchrow { display:flex; gap:.6rem; }
    .searchrow input { flex:1; border:1px solid var(--line); border-radius:7px; padding:.6rem .8rem;
      font-family:var(--font); font-size:1rem; background:var(--bg); color:var(--fg); }
    .searchrow input:focus { outline:2px solid var(--red); outline-offset:1px; }
    .btn { background:var(--red); color:#fff; border:0; border-radius:7px; padding:.6rem 1.3rem; font-weight:700;
      font-size:1rem; font-family:var(--font); cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; }
    .btn.ghost { background:none; color:var(--red); border:1px solid var(--red); }
    .chips { display:flex; align-items:center; gap:.45rem; flex-wrap:wrap; margin-top:.8rem; }
    .chips .chiplab { font-size:.78rem; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; margin-right:.2rem; }
    .chip { font-size:.85rem; color:var(--body); background:var(--bg); border:1px solid var(--line);
      border-radius:999px; padding:.25rem .75rem; text-decoration:none; white-space:nowrap; }
    .chip:hover { border-color:var(--red); color:var(--red); }
    .chip.on { background:var(--red); border-color:var(--red); color:#fff; font-weight:700; }
    .hint { font-size:.8rem; color:var(--muted); margin-top:.55rem; }

    /* stat tiles */
    .tiles { display:grid; grid-template-columns:repeat(4,1fr); gap:1rem; margin-bottom:1.4rem; }
    @media (max-width:720px){ .tiles{ grid-template-columns:repeat(2,1fr);} }
    .tile { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:1rem 1.1rem; box-shadow:var(--shadow); }
    .tile .n { font-size:1.9rem; font-weight:700; line-height:1; color:var(--fg); font-variant-numeric:tabular-nums; }
    .tile .l { font-size:.68rem; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-top:.45rem; font-family:var(--mono); }

    /* chart cards */
    .charts { display:grid; grid-template-columns:1fr 1fr; gap:1.4rem; }
    @media (max-width:820px){ .charts{ grid-template-columns:1fr;} }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:1.2rem 1.3rem; box-shadow:var(--shadow); }
    .card h3 { margin:0 0 .25rem; font-size:1.02rem; color:var(--fg); font-weight:700; }
    .card .note { font-size:.82rem; color:var(--muted); margin:0 0 1rem; }
    .card .foot { font-size:.82rem; margin:1rem 0 0; }
    .bars { display:flex; flex-direction:column; gap:.6rem; }
    .barrow { display:grid; grid-template-columns:minmax(7rem,11rem) 1fr 3.4rem; align-items:center; gap:.7rem; font-size:.85rem; }
    .barrow .lab { color:var(--body); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .track { background:var(--panel-2); border-radius:4px; height:16px; overflow:hidden; }
    .fill { height:100%; border-radius:4px; min-width:3px; background:var(--red); }
    .fill.gain { background:var(--buy); }
    .barrow .val { text-align:right; font-family:var(--mono); font-size:.8rem; color:var(--muted); font-variant-numeric:tabular-nums; }
    @media (max-width:820px){ .barrow{ grid-template-columns:minmax(6rem,8rem) 1fr 3.2rem;} }

    /* tables */
    .scroll { overflow-x:auto; border:1px solid var(--line); border-radius:10px; background:var(--panel); box-shadow:var(--shadow); }
    table { width:100%; border-collapse:collapse; font-size:.86rem; min-width:720px; }
    thead th { text-align:left; background:var(--panel-2); color:var(--fg); font-family:var(--mono);
      font-size:.66rem; letter-spacing:.06em; text-transform:uppercase; padding:.65rem .8rem; border-bottom:1px solid var(--line); white-space:nowrap; }
    tbody td { padding:.6rem .8rem; border-bottom:1px solid var(--line); vertical-align:top; }
    tbody tr:last-child td { border-bottom:0; }
    tbody tr:hover { background:var(--panel-2); }
    td.num { text-align:right; font-family:var(--mono); font-variant-numeric:tabular-nums; white-space:nowrap; }
    .tkr { font-family:var(--mono); font-weight:700; color:var(--fg); }
    .pill { font-family:var(--mono); font-size:.7rem; font-weight:700; padding:.1rem .45rem; border-radius:5px; white-space:nowrap; }
    .pill.buy { color:var(--buy); background:color-mix(in srgb,var(--buy) 14%,transparent); }
    .pill.sell { color:var(--sell); background:color-mix(in srgb,var(--sell) 14%,transparent); }
    .up{ color:var(--buy);} .down{ color:var(--sell);} .na{ color:var(--muted);}
    a.src { color:var(--red); text-decoration:none; font-family:var(--mono); font-size:.78rem; }
    a.src:hover { text-decoration:underline; }

    .meta { display:flex; justify-content:space-between; align-items:center; margin:0 0 .8rem; flex-wrap:wrap; gap:.6rem; }
    .meta .count { color:var(--muted); font-size:.92rem; }
    .pager { display:flex; justify-content:center; align-items:center; gap:1.2rem; margin-top:1.4rem; }
    .pager .pg { font-family:var(--mono); font-size:.85rem; color:var(--muted); }
    .empty { padding:2.4rem; text-align:center; color:var(--muted); }

    /* hover tooltip for the chart bars */
    .tip { position:fixed; pointer-events:none; background:var(--fg); color:var(--bg); font-size:.78rem;
      padding:.35rem .6rem; border-radius:6px; z-index:50; max-width:280px; display:none; }

    :focus-visible { outline:2px solid var(--red); outline-offset:2px; border-radius:3px; }
    footer { border-top:1px solid var(--line); color:var(--muted); font-size:.82rem; padding:1.6rem 0; }
  </style>
</head>
<body>
  <nav>
    <div class="container">
      <a class="brand" href="/">Insider Ledger <span>SEC Form 4</span></a>
      <div class="navlinks">
        <a href="/" class="{% block nav_home %}{% endblock %}">Dashboard</a>
        <a href="/search" class="{% block nav_search %}{% endblock %}">Search</a>
        <a href="/methodology" class="{% block nav_meth %}{% endblock %}">Methodology</a>
      </div>
    </div>
  </nav>
  <main>
    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </main>
  <footer>
    <div class="container">
      Insider Ledger &middot; A searchable record of SEC Form 4 insider trades, priced against the market.
      Public data; a trade is not proof of intent.
    </div>
  </footer>
  <div class="tip" id="tip" role="status"></div>
  <script>
    // one shared tooltip: any element with data-tip shows it on hover
    const tip = document.getElementById('tip');
    document.querySelectorAll('[data-tip]').forEach(el => {
      el.addEventListener('mousemove', e => {
        tip.textContent = el.dataset.tip;
        tip.style.display = 'block';
        tip.style.left = Math.min(e.clientX + 14, window.innerWidth - 290) + 'px';
        tip.style.top = (e.clientY + 16) + 'px';
      });
      el.addEventListener('mouseleave', () => { tip.style.display = 'none'; });
    });
  </script>
</body>
</html>
