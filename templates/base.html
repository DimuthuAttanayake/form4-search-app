<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Insider Ledger{% endblock %}</title>
  <style>
    :root {
      --bg: #f4f4f1; --surface: #ffffff; --surface-2: #eef0ee;
      --ink: #1c211f; --body: #3f4542; --muted: #727974; --line: #e2e4e1;
      --accent: #2f6f6a; --bar: #4a8c86;
      --buy: #2e7d55; --sell: #b5524a;
      --shadow: 0 1px 2px rgba(20,30,28,.05), 0 6px 22px rgba(20,30,28,.06);
      --serif: "Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
      --sans: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      --mono: ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg:#0f1312; --surface:#161b1a; --surface-2:#1b2220; --ink:#e9edea; --body:#ccd2ce;
        --muted:#8a928d; --line:#263130; --accent:#52b5a8; --bar:#52b5a8;
        --buy:#46c187; --sell:#dd7068; --shadow:0 1px 2px rgba(0,0,0,.4),0 8px 26px rgba(0,0,0,.35); }
    }
    :root[data-theme="dark"] { --bg:#0f1312; --surface:#161b1a; --surface-2:#1b2220; --ink:#e9edea; --body:#ccd2ce;
      --muted:#8a928d; --line:#263130; --accent:#52b5a8; --bar:#52b5a8;
      --buy:#46c187; --sell:#dd7068; --shadow:0 1px 2px rgba(0,0,0,.4),0 8px 26px rgba(0,0,0,.35); }
    :root[data-theme="light"] { --bg:#f4f4f1; --surface:#ffffff; --surface-2:#eef0ee; --ink:#1c211f; --body:#3f4542;
      --muted:#727974; --line:#e2e4e1; --accent:#2f6f6a; --bar:#4a8c86;
      --buy:#2e7d55; --sell:#b5524a; --shadow:0 1px 2px rgba(20,30,28,.05),0 6px 22px rgba(20,30,28,.06); }

    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--body); font-family:var(--sans);
      line-height:1.55; -webkit-font-smoothing:antialiased; }
    .container { max-width:1120px; margin:0 auto; padding:0 1.3rem; }

    /* nav */
    nav { border-bottom:1px solid var(--line); background:var(--surface); position:sticky; top:0; z-index:10; }
    nav .container { display:flex; align-items:center; justify-content:space-between; height:60px; }
    .brand { font-family:var(--serif); font-weight:600; font-size:1.25rem; color:var(--accent); text-decoration:none; letter-spacing:-.01em; }
    .brand span { color:var(--muted); font-family:var(--mono); font-size:.62rem; letter-spacing:.14em; text-transform:uppercase; vertical-align:middle; margin-left:.4rem; }
    .navlinks { display:flex; gap:1.4rem; }
    .navlinks a { color:var(--body); text-decoration:none; font-size:.92rem; padding:.3rem 0; border-bottom:2px solid transparent; }
    .navlinks a:hover { color:var(--accent); }
    .navlinks a.active { color:var(--accent); border-bottom-color:var(--accent); font-weight:600; }

    main { padding:2.4rem 0 4rem; }
    h1 { font-family:var(--serif); font-weight:600; font-size:clamp(1.9rem,4vw,2.7rem); line-height:1.06;
      color:var(--ink); margin:0 0 .5rem; letter-spacing:-.01em; text-wrap:balance; }
    .sub { color:var(--muted); font-size:1.02rem; max-width:60ch; margin:0 0 2rem; }
    .summary { color:var(--muted); font-family:var(--mono); font-size:.82rem; margin:0 0 1.4rem; }
    h2 { font-family:var(--serif); font-weight:600; font-size:1.35rem; color:var(--ink); margin:2.4rem 0 1rem;
      padding-bottom:.5rem; border-bottom:1px solid var(--line); }
    a { color:var(--accent); }

    /* stat tiles */
    .tiles { display:grid; grid-template-columns:repeat(4,1fr); gap:1rem; }
    @media (max-width:720px){ .tiles{ grid-template-columns:repeat(2,1fr);} }
    .tile { background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:1.1rem 1.2rem; box-shadow:var(--shadow); }
    .tile .n { font-family:var(--serif); font-size:2.1rem; line-height:1; color:var(--ink); font-variant-numeric:tabular-nums; }
    .tile .l { font-family:var(--mono); font-size:.68rem; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-top:.45rem; }

    /* charts */
    .charts { display:grid; grid-template-columns:1fr 1fr; gap:1.4rem; }
    @media (max-width:820px){ .charts{ grid-template-columns:1fr;} }
    .card { background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:1.3rem 1.4rem; box-shadow:var(--shadow); }
    .card h3 { margin:0 0 1rem; font-size:1rem; color:var(--ink); font-family:var(--sans); font-weight:700; }
    .bars { display:flex; flex-direction:column; gap:.6rem; }
    .barrow { display:grid; grid-template-columns:9rem 1fr 3rem; align-items:center; gap:.7rem; font-size:.85rem; }
    .barrow .lab { color:var(--body); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .track { background:var(--surface-2); border-radius:5px; height:16px; overflow:hidden; }
    .fill { height:100%; background:var(--bar); border-radius:5px; min-width:3px; }
    .barrow .val { text-align:right; font-family:var(--mono); font-size:.8rem; color:var(--muted); font-variant-numeric:tabular-nums; }
    @media (max-width:820px){ .barrow{ grid-template-columns:7rem 1fr 2.6rem;} }

    /* donut */
    .donutwrap { display:flex; align-items:center; gap:1.4rem; }
    .donut { width:132px; height:132px; border-radius:50%; flex:0 0 auto; position:relative; }
    .donut::after { content:""; position:absolute; inset:27%; border-radius:50%; background:var(--surface); }
    .legend { display:flex; flex-direction:column; gap:.55rem; font-size:.84rem; flex:1; min-width:0; }
    .legend .row { display:flex; align-items:center; gap:.55rem; }
    .legend .sw { width:11px; height:11px; border-radius:3px; flex:0 0 auto; }
    .legend .lab2 { color:var(--body); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .legend .v { color:var(--muted); font-family:var(--mono); margin-left:auto; padding-left:.5rem; font-variant-numeric:tabular-nums; }

    /* tables */
    .scroll { overflow-x:auto; border:1px solid var(--line); border-radius:12px; background:var(--surface); box-shadow:var(--shadow); }
    table { width:100%; border-collapse:collapse; font-size:.86rem; min-width:720px; }
    thead th { text-align:left; background:var(--surface-2); color:var(--ink); font-family:var(--mono);
      font-size:.66rem; letter-spacing:.06em; text-transform:uppercase; padding:.65rem .8rem; border-bottom:1px solid var(--line); white-space:nowrap; }
    tbody td { padding:.6rem .8rem; border-bottom:1px solid var(--line); vertical-align:top; }
    tbody tr:last-child td { border-bottom:0; }
    tbody tr:hover { background:var(--surface-2); }
    td.num { text-align:right; font-family:var(--mono); font-variant-numeric:tabular-nums; white-space:nowrap; }
    .tkr { font-family:var(--mono); font-weight:700; color:var(--ink); }
    .pill { font-family:var(--mono); font-size:.7rem; font-weight:700; padding:.1rem .45rem; border-radius:5px; white-space:nowrap; }
    .pill.buy { color:var(--buy); background:color-mix(in srgb,var(--buy) 14%,transparent); }
    .pill.sell { color:var(--sell); background:color-mix(in srgb,var(--sell) 14%,transparent); }
    .pill.neutral { color:var(--muted); background:var(--surface-2); }
    .up{ color:var(--buy);} .down{ color:var(--sell);} .na{ color:var(--muted);}
    a.src { color:var(--accent); text-decoration:none; font-family:var(--mono); font-size:.78rem; }
    a.src:hover { text-decoration:underline; }

    /* search bar */
    .searchbar { display:flex; gap:.7rem; margin-bottom:1.6rem; }
    .searchbar input { flex:1; border:1px solid var(--line); border-radius:9px; padding:.7rem .9rem; font-size:1rem;
      font-family:var(--sans); background:var(--surface); color:var(--ink); }
    .searchbar input:focus { outline:2px solid var(--accent); outline-offset:1px; }
    .btn { background:var(--accent); color:#fff; border:0; border-radius:9px; padding:.7rem 1.4rem; font-weight:700;
      font-size:1rem; font-family:var(--sans); cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; }
    .btn.ghost { background:none; color:var(--accent); border:1px solid var(--accent); }

    .meta { display:flex; justify-content:space-between; align-items:center; margin:0 0 .8rem; flex-wrap:wrap; gap:.6rem; }
    .meta .count { color:var(--muted); font-size:.92rem; }
    .pager { display:flex; justify-content:center; align-items:center; gap:1.2rem; margin-top:1.4rem; }
    .pager .pg { font-family:var(--mono); font-size:.85rem; color:var(--muted); }
    .empty { padding:2.4rem; text-align:center; color:var(--muted); }

    .highlight-note { font-size:.82rem; color:var(--muted); margin:.2rem 0 1rem; }
    :focus-visible { outline:2px solid var(--accent); outline-offset:2px; border-radius:3px; }
    footer { border-top:1px solid var(--line); color:var(--muted); font-size:.82rem; padding:1.6rem 0; }
  </style>
</head>
<body>
  <nav>
    <div class="container">
      <a class="brand" href="/">Insider Ledger <span>SEC Form 4</span></a>
      <div class="navlinks">
        <a href="/" class="{% block nav_home %}{% endblock %}">Dashboard</a>
        <a href="/search" class="{% block nav_search %}{% endblock %}">Search</a>
        <a href="/methodology" class="{% block nav_meth %}{% endblock %}">Methodology</a>
      </div>
    </div>
  </nav>
  <main>
    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </main>
  <footer>
    <div class="container">
      Insider Ledger &middot; A searchable record of SEC Form 4 insider trades, priced against the market.
      Public data; a trade is not proof of intent.
    </div>
  </footer>
</body>
</html>
